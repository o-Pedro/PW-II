<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Funcionário</title>
    <link rel="stylesheet" href="../CSS/Funcionario.CSS">
</head>
<body>
    <div id="fundo_formulario">
        <img src="../Imagens/Cadastro_Funcionnario.png" alt="" id="titulo">
        <a href="../HTML/Index.HTML"><img src="../Imagens/Logo.png" alt="" id="logo"></a>
        <hr>
            <form action="../PHP/salvar_funcionario.php" method="post">
                <label for="">CPF</label>
                    <input type="text" name="cpf" maxlength="11" required>
                    <br>
                <label for="">NOME</label>
                    <input type="text" name="nome_funcionario" required>
                    <br>
                <label for="">TELEFONE</label>
                    <input type="text" name="telefone" required>
                    <br>
                <label for="">DATA DE NASCIMENTO</label>
                    <input type="date" name="data_nascimento" required>
                    <br>
                <label for="">CEP</label>
                    <input type="text" name="cep" maxlength="8" required>
                    <br>
                <label for="">FUNÇÃO</label>
                    <select name="funcao" id="categoria" required>
                        <option value=""></option>
                        <option value="Atendente">Atendente</option>
                        <option value="Caixa">Caixa</option>
                        <option value="Gerente">Gerente</option>
                        <option value="Vendedor">Vendedor</option>
                    </select>
                    <br>
                <label for="">SALÁRIO</label>
                    <input type="number" step="0.01" name="salario" required>
                <div id="botoes_div">
                        <button type="submit" id="botoes_formulario">CADASTRAR</button>
                        <button type="button" id="botoes_formulario" onclick="window.location.href='../PHP/listar_funcionarios.php'">ATUALIZAR</button>
                        <button type="button" id="botoes_formulario">EXCLUIR</button>
                    </div>
            </form>
    </div>
</body>
</html>
