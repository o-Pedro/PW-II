<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Animal</title>
    <link rel="stylesheet" href="../css/estilo.css" type="text/css">
</head>
<body>
    <center>
        <h3>Cadastro de Animal</h3>
        <form name="form" method="post" action="" enctype="multipart/form-data">
            <div>
                <label for="nome">Nome:</label>
                <input type="text" name="nome" id="nome" required>
            </div>
            <br>
            <div>
                <label for="raca">Raça:</label>
                <input type="text" name="raca" id="raca" required>
            </div>
            <br>
            <div>
                <label for="idade">Idade:</label>
                <input type="number" name="idade" id="idade" required>
            </div>
            <br>
            <div>
                <label for="porte">Porte:</label>
                <input type="text" name="por" id="porte" required>
            </div>
            <br>
            <div>
                <label for="proprietario">Nome do Proprietário:</label>
                <input type="text" name="prop" id="proprietario" required>
            </div>
            <br>
            <div>
                <label for="imagem">Imagem do Pet:</label>
                <input type="file" name="imagem" id="imagem" accept="image/*" required>
            </div>
            <br>
            <div>
                <input type="submit" value="Salvar" id="botao-salvar">
                <input type="reset" value="Limpar Campos" id="botao-reset">
            </div>
        </form>
    </center>
</body>
</html>
