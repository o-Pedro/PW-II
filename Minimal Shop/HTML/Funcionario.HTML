<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Funcionário</title>
    <link rel="stylesheet" href="../CSS/Funcionario.CSS">
</head>
<body>
    <div id="fundo_formulario">
        <img src="../Imagens/Cadastro_Funcionnario.png" alt="" id="titulo">
        <a href="../HTML/Index.HTML"><img src="../Imagens/Logo.png" alt="" id="logo"></a>
        <hr>
            <form action="">
                <label for="">CPF</label>
                    <input type="number" name="codigo_produto" required>
                    <br>
                <label for="">NOME</label>
                    <input type="text" name="nome_produto" required>
                    <br>
                <label for="">TELEFONE</label>
                    <input type="number" name="preco_produto" required>
                    <br>
                <label for="">DATA DE NASCIMENTO</label>
                    <input type="date" name="quantidade_produto" required>
                    <br>
                <label for="">CEP</label>
                    <input type="number" name="marca_produto" required>
                    <br>
                <label for="">FUNÇÃO</label>
                    <select name="" id="categoria" required>
                        <option value=""></option>
                        <option value="">Atendente</option>
                        <option value="">Caixa</option>
                        <option value="">Gerente</option>
                        <option value="">Vendedor</option>
                    </select>
                    <br>
                <label for="">SALÁRIO</label>
                    <input type="number" name="preco_produto" required>
                <div id="botoes_div">
                        <button type="submit" id="botoes_formulario">CADASTRAR</button>
                        <button type="button" id="botoes_formulario">ATUALIZAR</button>
                        <button type="button" id="botoes_formulario">EXCLUIR</button>
                    </div>
            </form>
    </div>
</body>
</html>
