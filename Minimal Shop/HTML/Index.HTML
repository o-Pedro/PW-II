<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Shop</title>
    <link rel="stylesheet" href="../CSS/Estilo.CSS">
</head>
<body>
    <img src="../Imagens/Logo.png" alt="" id="logo">
    <img src="../Imagens/Titulo.png" alt="" id="titulo">
    <img src="../Imagens/Tela_Inicial.jpg" alt="" id="inicial">
    <img src="../Imagens/Slogan.png" alt="" id="slogan">
    <div id="fundo_opcao">
        <img src="../Imagens/Camisa.png" alt="" id="camisa">
        <h1 id="cadastro_produto">CADASTRO DE PRODUTO</h1>
        <h2 id="descricao">Gerencie seus produtos com simplicidade e estilo. Cadastre, organize e prepare sua vitrine para vender mais.</h2>
        <button type="button" class="btn-link">
            <a href="../HTML/Produto.HTML">CADASTRAR</a>
        </button>
    </div>
    <div id="fundo_opcao2">
        <img src="../Imagens/Funcionario.png" alt="" id="funcionario">
        <h1 id="cadastro_funcionario">CADASTRO DE FUNCIONÁRIO</h1>
        <h2 id="descricao">Gerencie sua equipe de funcionários com fácilidade. Cadastre e gerencie sua equipe para operar com eficiência.</h2>
        <button type="button" class="btn-link">
            <a href="../HTML/Funcionario.HTML">CADASTRAR</a>
        </button>
    </div>

</html>
