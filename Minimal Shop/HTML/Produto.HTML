<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Produto</title>
    <link rel="stylesheet" href="../CSS/Produto.CSS">
</head>
<body>
    <div id="fundo_formulario">
        <img src="../Imagens/Cadastro_Produto.png" alt="" id="titulo">
        <a href="../HTML/Index.HTML"><img src="../Imagens/Logo.png" alt="" id="logo"></a>
        <hr>
            <form action="">
                <label for="">CÓDIGO</label>
                    <input type="number" name="codigo_produto" required>
                    <br>
                <label for="">NOME</label>
                    <input type="text" name="nome_produto" required>
                    <br>
                <label for="">CATEGORIA</label>
                    <select name="" id="categoria" required>
                        <option value=""></option>
                        <option value="">Acessório</option>
                        <option value="">Bermuda</option>
                        <option value="">Calça</option>
                        <option value="">Camiseta</option>
                        <option value="">Jaqueta</option>
                    </select>
                    <br>
                <label for="">COR</label>
                    <select name="" id="categoria" required>
                        <option value=""></option>
                        <option value="">Branco</option>
                        <option value="">Cinza</option>
                        <option value="">Off-white</option>
                        <option value="">Preto</option>
                    </select>
                    <br>
                <label for="">MARCA</label>
                    <input type="text" name="marca_produto" required>
                    <br>
                <label for="">DESCRIÇÃO</label>
                    <textarea name="descricao_produto" id="descricao" required></textarea>
                    <br>
                <label for="">PREÇO</label>
                    <input type="number" name="preco_produto" required>
                    <br>
                <label for="">QUANTIDADE</label>
                    <input type="number" name="quantidade_produto" required>
                    <div id="botoes_div">
                    <button type="submit" id="botoes_formulario">CADASTRAR</button>
                    <button type="button" id="botoes_formulario">ATUALIZAR</button>
                    <button type="button" id="botoes_formulario">EXCLUIR</button>
                    </div>
            </form>
    </div>
</body>
</html>
